name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aibid_test
          POSTGRES_USER: aibid
          POSTGRES_PASSWORD: aibid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aibid -d aibid_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://aibid:aibid_test@localhost:5432/aibid_test
      DATABASE_SSL: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend checks
        run: npm run check

      - name: Apply PostgreSQL migrations
        run: npm run db:migrate

      - name: Run PostgreSQL repository smoke test
        run: npm run db:smoke

  contracts:
    name: Contract and Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Lint OpenAPI contract
        run: npx --yes @redocly/cli@2.38.0 lint docs/api/openapi.yaml

      - name: Validate Docker Compose configuration
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml config --quiet
