name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aibid_test
          POSTGRES_USER: aibid
          POSTGRES_PASSWORD: aibid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aibid -d aibid_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    env:
      REPOSITORY_DRIVER: postgres
      DATABASE_URL: postgresql://aibid:aibid_test@localhost:5432/aibid_test
      DATABASE_SSL: "false"
      OBJECT_STORAGE_DRIVER: s3
      OBJECT_STORAGE_TIMEOUT_MS: "10000"
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: aibid-test
      S3_ACCESS_KEY: aibid-ci
      S3_SECRET_KEY: aibid-ci-secret
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://localhost:6379/0
      REDIS_STREAM_KEY: aibid:parse-tasks
      REDIS_CONSUMER_GROUP: aibid-parser
      REDIS_CLAIM_IDLE_MS: "60000"
      WORKER_ID: worker-ci-1
      WORKER_CONCURRENCY: "2"
      TASK_LEASE_MS: "30000"
      TASK_HEARTBEAT_MS: "10000"
      TASK_MAX_ATTEMPTS: "3"
      TASK_RETRY_BACKOFF_MS: "1000"
      OUTBOX_POLL_INTERVAL_MS: "250"
      OUTBOX_LEASE_MS: "10000"
      OUTBOX_BATCH_SIZE: "20"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start Redis and initialize MinIO
        working-directory: ${{ github.workspace }}
        env:
          MINIO_ROOT_USER: aibid-ci
          MINIO_ROOT_PASSWORD: aibid-ci-secret
          S3_BUCKET: aibid-test
          MINIO_API_PORT: 9000
          MINIO_CONSOLE_PORT: 9001
        run: |
          docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml up -d --wait redis minio
          docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml up --no-deps minio-init

      - name: Run backend checks
        run: npm run check

      - name: Apply PostgreSQL migrations
        run: npm run db:migrate

      - name: Run persistence smoke test
        run: npm run db:smoke

      - name: Run durable worker smoke test
        run: npm run worker:smoke

      - name: Show infrastructure logs on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml logs redis minio minio-init

  contracts:
    name: Contract and full-stack validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Lint OpenAPI contract
        run: npx --yes @redocly/cli@2.38.0 lint docs/api/openapi.yaml

      - name: Validate Docker Compose configuration
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml config --quiet

      - name: Start production API and worker Compose stack
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml up -d --build

      - name: Run HTTP to independent worker full-stack smoke
        run: node deploy/full-stack-smoke.mjs

      - name: Show full-stack logs on failure
        if: failure()
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml logs

      - name: Stop full-stack services
        if: always()
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml down --volumes
