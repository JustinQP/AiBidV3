openapi: 3.1.0
info:
  title: AiBidV3 API
  version: 0.1.0
  summary: AI 投标书 MVP 纵向切片 API
  description: |
    AiBidV3 MVP 开发契约，覆盖项目、文件上传、可靠异步解析任务、
    提取要求和人工确认。PostgreSQL 模式的新上传创建 `document-parse-v1`
    任务，由独立 worker 在线程隔离与资源边界内解析数字 PDF、DOCX 和严格
    UTF-8 TXT，并用 `deterministic-rules-v1` 产出可校验的版本化 locator。
    默认内存模式和历史任务继续使用明确标记的 `development-fixture`，不得
    把该兼容结果呈现为真实原文证据。

    JSON 字段使用 camelCase。成功响应统一包裹在 `data` 中；错误响应
    使用 RFC 7807 `application/problem+json`。

    当前实现使用 `DEV_TENANT_ID` 或可选 `x-tenant-id` 请求头注入本地租户
    上下文，仅用于开发联调，不代表生产认证方案。生产环境必须从已验证的
    身份令牌生成租户上下文，并移除开发请求头覆盖能力。
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: http://localhost:3000
    description: 本地开发 API
# The first-stage server is intentionally unauthenticated and injects a
# development tenant context. Production authentication will replace this.
security: []
tags:
  - name: Health
    description: 运行状态
  - name: Projects
    description: 投标项目
  - name: Files
    description: 招标文件上传与状态
  - name: Tasks
    description: 解析任务
  - name: Requirements
    description: 提取要求与人工确认

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: 检查 API、Repository 与对象存储就绪状态
      responses:
        "200":
          description: API 正常运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          $ref: "#/components/responses/Problem"

  /api/v1/projects:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
    get:
      tags: [Projects]
      operationId: listProjects
      summary: 查询当前租户的项目
      responses:
        "200":
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [Projects]
      operationId: createProject
      summary: 创建投标项目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: 项目已创建
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Projects]
      operationId: getProject
      summary: 获取项目详情
      responses:
        "200":
          description: 项目详情
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/projects/{projectId}/files:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Files]
      operationId: listProjectFiles
      summary: 查询项目文件
      responses:
        "200":
          description: 文件列表
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectFile"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
    post:
      tags: [Files]
      operationId: uploadProjectFile
      summary: 上传文件并创建异步解析任务
      description: |
        接收名为 `file` 的 multipart 文件。文件与任务记录持久化成功后立即
        返回 `202 Accepted`；解析结果通过任务资源轮询，不在本请求中返回。

        新上传会先写入对象存储，再以数据库事务创建文件元数据与任务。对象
        存储不可用时返回 `503`，且不会创建文件或任务记录。

        仅接受数字 PDF、DOCX 和严格 UTF-8 TXT；legacy `.doc` 返回 `415`。
        PostgreSQL 模式创建 `document-parse-v1` 并由独立 worker 执行真实确定性
        解析；默认内存模式创建 `development-document-parse` 并保留 fixture 兼容。
        单文件硬上限为 25 MiB，部署配置只能收紧，不能调高。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 数字 PDF、DOCX 或严格 UTF-8 TXT；25 MiB 硬上限仅可收紧
            encoding:
              file:
                contentType: application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document, text/plain
      responses:
        "202":
          description: 文件已接收，解析任务已排队
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAcceptedResponse"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        "413":
          $ref: "#/components/responses/Problem"
        "415":
          $ref: "#/components/responses/Problem"
        "503":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/projects/{projectId}/tasks:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Tasks]
      operationId: listProjectTasks
      summary: 查询项目解析任务
      responses:
        "200":
          description: 任务列表
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ParseTask"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Tasks]
      operationId: getTask
      summary: 获取解析任务状态
      responses:
        "200":
          description: 任务状态
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ParseTask"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/tasks/{taskId}/retry:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      operationId: retryTask
      summary: 重试失败的解析任务
      description: |
        仅 `failed` 任务可重试。服务端把同一任务恢复为 `queued` 并创建新的
        outbox 投递事件；其他状态返回 `TASK_NOT_RETRYABLE`。默认内存模式仍
        在 API 进程内调用开发解析适配器。
      responses:
        "202":
          description: 任务已重新排队
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ParseTask"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/projects/{projectId}/requirements:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Requirements]
      operationId: listProjectRequirements
      summary: 查询项目提取要求
      parameters:
        - name: confirmationStatus
          in: query
          description: 按人工确认状态过滤
          schema:
            $ref: "#/components/schemas/ConfirmationStatus"
        - name: priority
          in: query
          description: 按优先级过滤
          schema:
            $ref: "#/components/schemas/RequirementPriority"
      responses:
        "200":
          description: 要求列表
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Requirement"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /api/v1/projects/{projectId}/requirements/{requirementId}/confirmation:
    parameters:
      - $ref: "#/components/parameters/DevTenantId"
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/RequirementId"
    patch:
      tags: [Requirements]
      operationId: updateRequirementConfirmation
      summary: 确认或驳回提取要求
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementConfirmationInput"
      responses:
        "200":
          description: 已更新的要求
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Requirement"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"

components:
  parameters:
    DevTenantId:
      name: x-tenant-id
      in: header
      required: false
      description: |
        仅开发环境可用的租户覆盖值；省略时使用服务端 `DEV_TENANT_ID`。
        此请求头不是认证机制，生产环境必须禁用。
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z0-9_-]+$"
        examples: [tenant-demo]
    ProjectId:
      name: projectId
      in: path
      required: true
      description: 项目 ULID
      schema:
        $ref: "#/components/schemas/ResourceId"
    TaskId:
      name: taskId
      in: path
      required: true
      description: 任务 ULID
      schema:
        $ref: "#/components/schemas/ResourceId"
    RequirementId:
      name: requirementId
      in: path
      required: true
      description: 要求 ULID
      schema:
        $ref: "#/components/schemas/ResourceId"

  responses:
    Problem:
      description: RFC 7807 错误
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    ResourceId:
      type: string
      minLength: 26
      maxLength: 26
      pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
      examples: ["01JZ7Y6N2ZQ6N3F1J9YK0N3B8A"]

    Timestamp:
      type: string
      format: date-time
      examples: ["2026-07-10T18:30:00.000Z"]

    HealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status, repository, timestamp]
          properties:
            status:
              type: string
              const: ok
            repository:
              type: string
              enum: [memory, postgres]
            timestamp:
              $ref: "#/components/schemas/Timestamp"

    ProjectStatus:
      type: string
      enum: [draft, active, archived]

    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - code
        - customerName
        - ownerName
        - deadline
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        name:
          type: string
          minLength: 1
          maxLength: 160
        code:
          type: [string, "null"]
          maxLength: 80
        customerName:
          type: [string, "null"]
          maxLength: 160
        ownerName:
          type: [string, "null"]
          maxLength: 160
        deadline:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    CreateProjectInput:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
          examples: ["智慧园区综合服务投标项目"]
        code:
          type: [string, "null"]
          maxLength: 80
          examples: ["BID-2026-001"]
        customerName:
          type: [string, "null"]
          maxLength: 160
          examples: ["示例客户"]
        ownerName:
          type: [string, "null"]
          maxLength: 160
          examples: ["项目负责人"]
        deadline:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    FileParseStatus:
      type: string
      enum: [queued, parsing, parsed, failed]

    ProjectFile:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - fileName
        - mediaType
        - sizeBytes
        - sha256
        - parseStatus
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        projectId:
          $ref: "#/components/schemas/ResourceId"
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        mediaType:
          type: string
          minLength: 1
          maxLength: 255
        sizeBytes:
          type: integer
          minimum: 1
          maximum: 26214400
          description: 单文件 25 MiB 硬上限；部署配置只能收紧
        sha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
        parseStatus:
          $ref: "#/components/schemas/FileParseStatus"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    TaskStatus:
      type: string
      enum: [queued, running, succeeded, failed]

    TaskError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
        message:
          type: string
          minLength: 1
          maxLength: 1000

    ParseTask:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - fileId
        - type
        - status
        - progress
        - attempt
        - error
        - createdAt
        - startedAt
        - finishedAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        projectId:
          $ref: "#/components/schemas/ResourceId"
        fileId:
          $ref: "#/components/schemas/ResourceId"
        type:
          type: string
          enum: [development-document-parse, document-parse-v1]
          description: |
            `document-parse-v1` 用于 PostgreSQL 模式的新上传和真实隔离解析；
            `development-document-parse` 保留给默认内存模式与历史 fixture 任务。
        status:
          $ref: "#/components/schemas/TaskStatus"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        attempt:
          type: integer
          minimum: 0
          description: 当前自动重试周期内成功领取任务租约的次数；初始为 0，人工重试后重置
        error:
          oneOf:
            - $ref: "#/components/schemas/TaskError"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        startedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        finishedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    RequirementCategory:
      type: string
      enum: [technical, commercial, compliance]

    RequirementPriority:
      type: string
      enum: [mandatory, important, normal]

    ConfirmationStatus:
      type: string
      enum: [pending, confirmed, rejected]

    DevelopmentSourceLocator:
      type: object
      additionalProperties: false
      description: |
        内存模式与历史任务的兼容定位器。`kind=development-fixture` 明确表示
        内容不是从原文件真实定位所得，客户端不得渲染为已验证的原文引用。
      required:
        - kind
        - fileId
        - fileName
        - pageNumber
        - sectionPath
        - paragraphIndex
        - quote
      properties:
        kind:
          type: string
          const: development-fixture
        fileId:
          $ref: "#/components/schemas/ResourceId"
        fileName:
          type: string
        pageNumber:
          type: "null"
        sectionPath:
          type: array
          items:
            type: string
        paragraphIndex:
          type: "null"
        quote:
          type: string
          minLength: 1

    RealSourceLocatorBaseV1:
      type: object
      description: |
        真实解析 locator 的版本化公共元数据。`textStart`/`textEnd` 是规范化
        文本中的 UTF-16 半开区间，必须与 `quote` 一致；哈希均为小写 SHA-256。
      required:
        - version
        - sourceFileId
        - sourceFileName
        - sourceRevision
        - sourceSha256
        - quote
        - quoteSha256
        - textStart
        - textEnd
        - sectionPath
        - parserVersion
      properties:
        version:
          type: integer
          const: 1
        sourceFileId:
          $ref: "#/components/schemas/ResourceId"
        sourceFileName:
          type: string
          minLength: 1
          maxLength: 255
        sourceRevision:
          type: integer
          const: 1
        sourceSha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
        quote:
          type: string
          minLength: 1
          description: NFC、LF 换行的精确规范化原文片段
        quoteSha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
        textStart:
          type: integer
          minimum: 0
        textEnd:
          type: integer
          minimum: 1
          description: 必须大于 textStart，且差值等于 quote 的 UTF-16 长度
        sectionPath:
          type: array
          items:
            type: string
            minLength: 1
        parserVersion:
          type: string
          minLength: 1

    PdfBoundingBoxV1:
      type: object
      additionalProperties: false
      description: 左上角原点、0–1 归一化的页面边界框；矩形必须留在页面内
      required: [x, y, width, height]
      properties:
        x:
          type: number
          minimum: 0
          maximum: 1
        y:
          type: number
          minimum: 0
          maximum: 1
        width:
          type: number
          exclusiveMinimum: 0
          maximum: 1
        height:
          type: number
          exclusiveMinimum: 0
          maximum: 1

    PdfRegionV1:
      type: object
      additionalProperties: false
      required: [page, bbox]
      properties:
        page:
          type: integer
          minimum: 1
          description: 1-based PDF 页码
        bbox:
          $ref: "#/components/schemas/PdfBoundingBoxV1"

    PdfSourceLocatorV1:
      allOf:
        - $ref: "#/components/schemas/RealSourceLocatorBaseV1"
        - type: object
          required: [kind, regions]
          properties:
            kind:
              type: string
              const: pdf
            regions:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/PdfRegionV1"
      unevaluatedProperties: false

    DocxTablePathEntryV1:
      type: object
      additionalProperties: false
      required: [tableIndex, rowIndex, cellIndex]
      properties:
        tableIndex:
          type: integer
          minimum: 0
        rowIndex:
          type: integer
          minimum: 0
        cellIndex:
          type: integer
          minimum: 0

    DocxTextRangeV1:
      type: object
      additionalProperties: false
      required: [paragraphId, paragraphIndex, tablePath, charStart, charEnd]
      properties:
        paragraphId:
          type: [string, "null"]
          minLength: 1
          description: DOCX 稳定段落标识；源文档未提供时为 null
        paragraphIndex:
          type: integer
          minimum: 0
        tablePath:
          type: array
          description: 非表格段落为空数组；表格内容保存嵌套表/行/单元格路径
          items:
            $ref: "#/components/schemas/DocxTablePathEntryV1"
        charStart:
          type: integer
          minimum: 0
        charEnd:
          type: integer
          minimum: 1
          description: 段落或单元格中的 UTF-16 半开区间终点，必须大于 charStart

    DocxSourceLocatorV1:
      allOf:
        - $ref: "#/components/schemas/RealSourceLocatorBaseV1"
        - type: object
          required: [kind, ranges]
          properties:
            kind:
              type: string
              const: docx
            ranges:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/DocxTextRangeV1"
      unevaluatedProperties: false

    TxtPositionV1:
      type: object
      additionalProperties: false
      required: [line, column]
      properties:
        line:
          type: integer
          minimum: 1
          description: 1-based 物理行号
        column:
          type: integer
          minimum: 0
          description: 0-based UTF-16 列号

    TxtSourceLocatorV1:
      allOf:
        - $ref: "#/components/schemas/RealSourceLocatorBaseV1"
        - type: object
          required: [kind, start, end]
          properties:
            kind:
              type: string
              const: txt
            start:
              $ref: "#/components/schemas/TxtPositionV1"
            end:
              $ref: "#/components/schemas/TxtPositionV1"
      unevaluatedProperties: false

    SourceLocator:
      oneOf:
        - $ref: "#/components/schemas/DevelopmentSourceLocator"
        - $ref: "#/components/schemas/PdfSourceLocatorV1"
        - $ref: "#/components/schemas/DocxSourceLocatorV1"
        - $ref: "#/components/schemas/TxtSourceLocatorV1"
      discriminator:
        propertyName: kind
        mapping:
          development-fixture: "#/components/schemas/DevelopmentSourceLocator"
          pdf: "#/components/schemas/PdfSourceLocatorV1"
          docx: "#/components/schemas/DocxSourceLocatorV1"
          txt: "#/components/schemas/TxtSourceLocatorV1"

    Requirement:
      type: object
      additionalProperties: false
      oneOf:
        - title: Historical or in-memory fixture requirement
          properties:
            extractionMethod:
              type: string
              const: development-fixture
            confidence:
              type: "null"
            sourceLocator:
              $ref: "#/components/schemas/DevelopmentSourceLocator"
        - title: Real deterministic parser requirement
          properties:
            extractionMethod:
              type: string
              const: deterministic-rules-v1
            confidence:
              type: number
              minimum: 0
              maximum: 1
            sourceLocator:
              oneOf:
                - $ref: "#/components/schemas/PdfSourceLocatorV1"
                - $ref: "#/components/schemas/DocxSourceLocatorV1"
                - $ref: "#/components/schemas/TxtSourceLocatorV1"
              discriminator:
                propertyName: kind
                mapping:
                  pdf: "#/components/schemas/PdfSourceLocatorV1"
                  docx: "#/components/schemas/DocxSourceLocatorV1"
                  txt: "#/components/schemas/TxtSourceLocatorV1"
      required:
        - id
        - projectId
        - fileId
        - taskId
        - code
        - title
        - description
        - category
        - priority
        - confirmationStatus
        - confirmationNote
        - confirmedAt
        - extractionMethod
        - confidence
        - sourceLocator
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        projectId:
          $ref: "#/components/schemas/ResourceId"
        fileId:
          $ref: "#/components/schemas/ResourceId"
        taskId:
          $ref: "#/components/schemas/ResourceId"
        code:
          type: string
          minLength: 1
          maxLength: 100
        title:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          minLength: 1
        category:
          $ref: "#/components/schemas/RequirementCategory"
        priority:
          $ref: "#/components/schemas/RequirementPriority"
        confirmationStatus:
          $ref: "#/components/schemas/ConfirmationStatus"
        confirmationNote:
          type: [string, "null"]
          maxLength: 1000
        confirmedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        extractionMethod:
          type: string
          enum: [development-fixture, deterministic-rules-v1]
          description: |
            `development-fixture` 仅用于内存/历史兼容；
            `deterministic-rules-v1` 表示数字文档的真实确定性提取。
        confidence:
          type: [number, "null"]
          minimum: 0
          maximum: 1
          description: fixture 必须为 null；真实确定性结果为 0–1 数值
        sourceLocator:
          $ref: "#/components/schemas/SourceLocator"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    RequirementConfirmationInput:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, rejected]
        note:
          type: [string, "null"]
          maxLength: 1000

    UploadAcceptedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [file, task]
          properties:
            file:
              $ref: "#/components/schemas/ProjectFile"
            task:
              $ref: "#/components/schemas/ParseTask"

    InvalidParameter:
      type: object
      additionalProperties: false
      required: [name, reason]
      properties:
        name:
          type: string
        reason:
          type: string

    Problem:
      type: object
      description: RFC 7807 Problem Details；扩展字段用于稳定机器处理和请求关联
      required: [type, title, status, detail, instance, requestId, code]
      properties:
        type:
          type: string
          format: uri-reference
          examples: ["https://aibid.example/problems/validation-error"]
        title:
          type: string
          examples: ["请求参数无效"]
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          examples: ["请检查请求字段后重试。"]
        instance:
          type: string
          format: uri-reference
          examples: ["/api/v1/projects"]
        requestId:
          type: string
          examples: ["req-01JZ7Y6N2ZQ6N3F1J9YK0N3B8A"]
        code:
          type: string
          pattern: "^[A-Z][A-Z0-9_]*$"
          examples: ["VALIDATION_ERROR"]
        invalidParams:
          type: array
          items:
            $ref: "#/components/schemas/InvalidParameter"
      additionalProperties: true
